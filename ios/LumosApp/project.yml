# XcodeGen spec for LumosApp.
# Generate the .xcodeproj with: `xcodegen generate` (run from this directory).
# Reference: https://github.com/yonaskolb/XcodeGen
name: LumosApp
options:
  bundleIdPrefix: com.lumos
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""           # filled in CI
    CODE_SIGN_STYLE: Manual
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  LumosKit:
    path: ../LumosKit            # local SwiftPM package

targets:
  LumosApp:
    type: application
    platform: iOS
    sources:
      - path: LumosApp.swift
      - path: RootFlowView.swift
      - path: DesignSystem
      - path: Screens
    info:
      path: Info.plist
      properties:
        CFBundleName: Lumos
        CFBundleDisplayName: Lumos
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSBluetoothAlwaysUsageDescription: "Lumos uses Bluetooth to discover nearby people who chose to be visible in this venue."
        NSLocalNetworkUsageDescription: "Lumos uses your local network to exchange messages directly with nearby devices, without sending data to any server."
        NSCameraUsageDescription: "Lumos uses the camera to scan QR codes for venue handoff."
        NSPhotoLibraryUsageDescription: "Lumos uses the photo library to send media in conversations."
    dependencies:
      - package: LumosKit
        product: LumosKit
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_BUNDLE_IDENTIFIER: com.lumos.app

  LumosAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LumosAppTests
    dependencies:
      - target: LumosApp
      - package: LumosKit
        product: LumosKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumos.app.tests
