name: Lumos CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Gradle build + test
        run: |
          ./gradlew --no-daemon clean test lint
      - name: Assemble Release
        run: |
          ./gradlew --no-daemon :app:assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install iOS build tooling
        run: |
          brew update
          brew install xcodegen xcbeautify
      - name: Generate Xcode project
        working-directory: ios/LumosApp
        run: |
          xcodegen generate
      - name: Build + test app integration target
        working-directory: ios/LumosApp
        run: |
          xcodebuild \
            -project LumosApp.xcodeproj \
            -scheme LumosApp \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            clean test | xcbeautify
      - name: Build + test LumosKit SwiftPM package
        working-directory: ios/LumosKit
        run: |
          xcodebuild \
            -scheme LumosKit-Package \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            clean test | xcbeautify
