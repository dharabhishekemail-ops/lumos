name: Linux Gates RC2.1

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  linux-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python requirements
        run: python -m pip install --upgrade pip && pip install -r tools/requirements.txt

      - name: Run RC2.1 Linux gates
        run: make all

      - name: Upload evidence bundle and JSON reports
        uses: actions/upload-artifact@v4
        with:
          name: rc2-1-linux-gates-evidence
          if-no-files-found: error
          path: |
            evidence_bundle.zip
            docs/*.json
